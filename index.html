<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>highvillage.de</title>
<style>
  :root {
    color-scheme: light dark;
    --fg: #1a1a1a;
    --bg: #ffffff;
    --muted: #666666;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --fg: #f0f0f0;
      --bg: #121212;
      --muted: #999999;
    }
  }
  html, body {
    height: 100%;
    margin: 0;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    text-align: center;
    padding: 1.5rem;
    box-sizing: border-box;
  }
  h1 {
    font-size: 1.5rem;
    font-weight: 600;
    margin: 0 0 0.5rem;
  }
  p {
    color: var(--muted);
    margin: 0;
  }
  a {
    color: inherit;
  }
</style>
</head>
<body>
  <div>
    <h1>highvillage.de</h1>
    <p>Diese Domain wird derzeit nicht als Webseite genutzt.</p>
  </div>
</body>
</html>
